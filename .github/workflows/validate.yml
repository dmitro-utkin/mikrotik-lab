name: Validate MikroTik configs

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate generated RouterOS configs
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\Test-MikroTikConfigs.ps1
